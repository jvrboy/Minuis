name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate lockfile and install
        run: |
          npm install --package-lock-only --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install

      - name: Configure Xcode for unsigned build
        run: |
          IOS_PROJ="ios/Minuis.xcodeproj/project.pbxproj"
          if [ -f "$IOS_PROJ" ]; then
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$IOS_PROJ"
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$IOS_PROJ"
            sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' "$IOS_PROJ"
            sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' "$IOS_PROJ"
            sed -i '' '/DEVELOPMENT_TEAM/d' "$IOS_PROJ"
            sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ""/PROVISIONING_PROFILE_SPECIFIER = ""/g' "$IOS_PROJ"
            sed -i '' 's/PROVISIONING_PROFILE = ""/PROVISIONING_PROFILE = ""/g' "$IOS_PROJ"
            echo "Disabled code signing in Xcode project"
          else
            echo "Warning: Xcode project not found at $IOS_PROJ"
            find ios -name "*.pbxproj" -type f 2>/dev/null || echo "No pbxproj found"
          fi

      - name: Build unsigned .app
        run: |
          cd ios
          xcodebuild \
            -workspace Minuis.xcworkspace \
            -scheme Minuis \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build \
            BUILD_NUMBER=${{ github.run_number }} \
            MARKETING_VERSION=1.0.${{ github.run_number }}

      - name: Package unsigned IPA
        run: |
          mkdir -p output
          APP_PATH="build/Build/Products/Release-iphoneos/Minuis.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r Minuis.ipa Payload
            mv Minuis.ipa output/
            ls -lh output/Minuis.ipa
            rm -rf Payload
            echo "IPA built successfully"
          else
            echo "Error: .app bundle not found at $APP_PATH"
            find build -name "*.app" -type d 2>/dev/null || echo "No .app found in build/"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: Minuis-iOS-unsigned-${{ github.run_number }}
          path: output/Minuis.ipa
          compression-level: 0
          retention-days: 90

      - name: Build size report
        run: |
          if [ -f output/Minuis.ipa ]; then
            SIZE=$(stat -f%z "output/Minuis.ipa" 2>/dev/null || stat -c%s "output/Minuis.ipa" 2>/dev/null)
            echo "IPA size: $SIZE bytes ($(( SIZE / 1048576 )) MB)"
            echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "- **IPA size**: $(( SIZE / 1048576 )) MB" >> $GITHUB_STEP_SUMMARY
            echo "- **Run**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          fi
